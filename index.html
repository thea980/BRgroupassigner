<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Group Assigner</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: sans-serif;
    margin: 30px;
    background-color: #f3edf7;
}

/* 输入框 & 输出框字体和大小 */
textarea,
pre {
    width: 100%;
    box-sizing: border-box;
    font-family: Verdana, sans-serif; 
    font-size: 16px;                  
    margin-bottom: 12px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

#kingdoms { height: 170px; }
#attendees { height: 120px; }

pre {
    height: 170px;
    background: #ffffff;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-y: auto;
}

button {
    font-family: "Trebuchet MS", sans-serif;
    font-weight: bold;
    cursor: pointer;
    background-color: #d6b7e6;
    border: none;
    border-radius: 10px;
    color: #333;

    box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    transition: all 0.1s ease-in-out;
}

button:hover {
    background-color: #c9a4dd;
    box-shadow: 4px 4px 6px rgba(0,0,0,0.4);
}

button:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

.main-btn {
    display: block;
    margin-top: 10px;
    margin-bottom: 10px;
    font-size: 20px;
    padding: 12px 26px;
}

.small-btn {
    padding: 6px 14px;
    font-size: 16px;
    position: absolute;
    z-index: 10;
}

.paste-btn {
    top: -36px;
    right: 10px;
}

.copy-btn {
    bottom: 6px;
    right: 10px;
}

.copy-hint {
    position: absolute;
    bottom: 48px;
    right: 10px;
    background: #333;
    color: #fff;
    font-size: 14px;
    padding: 4px 10px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

label {
    font-weight: bold;
    font-size: 18px;
    display: block;
    margin-bottom: 7px;
}

.box {
    position: relative;
    width: 100%;
}

@media (max-width: 768px) {
    body { margin: 10px; }
    textarea, pre { font-size: 18px; }
    button { font-size: 18px; box-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    button:hover { box-shadow: 4px 4px 6px rgba(0,0,0,0.4); }
}
</style>
</head>

<body>

<label>Enter Kindoms' names:</label>
<div class="box">
<textarea id="kingdoms"
placeholder="  GoC / RAG&#10;1Jabber:&#10;2Mort:&#10  ......&#10(A COLON IS REQUIRED after each name; other formatting is flexible.)"></textarea>
<button class="small-btn paste-btn" onclick="pasteTo('kingdoms')">PASTE</button>
</div>

<label>Enter attendees:</label>
<div class="box">
<textarea id="attendees"
placeholder="cappy,chaos,mia,ven,tia, ......"></textarea>
<button class="small-btn paste-btn" onclick="pasteTo('attendees')">PASTE</button>
</div>

<button class="main-btn" onclick="runPython()">Generate Groupings</button>

<div class="box">
<pre id="output"></pre>
<button id="copyBtn" class="small-btn copy-btn" onclick="copyOutput()">COPY</button>
<div id="copyHint" class="copy-hint">Copied!</div>
</div>

<script>

let pyodideReadyPromise = loadPyodide({
    indexURL:"https://cdn.jsdelivr.net/pyodide/v0.23.4/full/"
});

async function pasteTo(id) {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById(id).value = text;
    } catch (err) {
        alert("Clipboard access denied");
    }
}

function copyOutput() {
    const text = document.getElementById("output").textContent;
    const copyBtn = document.getElementById("copyBtn");
    navigator.clipboard.writeText(text).then(() => {
        const hint = document.getElementById("copyHint");
        hint.style.opacity = "1";
        const originalText = copyBtn.textContent;
        copyBtn.textContent = "✓";
        setTimeout(() => {
            hint.style.opacity = "0";
            copyBtn.textContent = originalText;
        }, 1500);
    });
}

async function runPython() {

const outputElem = document.getElementById("output");
outputElem.textContent = "Running...\n";

let pyodide = await pyodideReadyPromise;

let kingdomsText = JSON.stringify(document.getElementById("kingdoms").value);
let attendeesText = JSON.stringify(document.getElementById("attendees").value);

let pythonCode = `

import random

NAME_MAP = {
    "cappy": "chikki",
    "babychick": "baby"
}

CONFLICTS = {
    ("wiwi","willy"),
    ("chikki","baby"),
    ("sera","sera2"),
}

def conflict(a, b):
    a=a.split("__")[0]
    b=b.split("__")[0]
    return (a, b) in CONFLICTS or (b, a) in CONFLICTS

input_text = ${kingdomsText}
parts = input_text.split(":")
GROUP_COUNT = len(parts) - 1

text = ${attendeesText}

raw_items = [x.strip() for x in text.split(",") if x.strip()]
items = []
display_name = {}

for i,name in enumerate(raw_items):
    key = NAME_MAP.get(name.lower(), name.lower())
    uid = key+"__"+str(i)
    items.append(uid)
    display_name[uid] = name

conflict_count = {item: sum(conflict(item, other) for other in items if other != item) for item in items}

def priority_key(item):
    return (-conflict_count[item], random.random())

items_sorted = sorted(items, key=priority_key)

MAX_TRIES = 5000
best_result = None

while best_result is None:

    for _ in range(MAX_TRIES):

        groups = [[] for _ in range(GROUP_COUNT)]

        for i in range(min(GROUP_COUNT, len(items_sorted))):
            groups[i].append(items_sorted[i])

        rest = items_sorted[GROUP_COUNT:]

        for item in rest:

            candidates = [g for g in groups if not any(conflict(item, x) for x in g)]

            if not candidates:
                break

            valid_candidates = []

            for idx, g in enumerate(groups):

                if g not in candidates:
                    continue

                new_len = len(g) + 1

                prev_ok = (idx == 0) or (len(groups[idx - 1]) >= new_len)
                next_ok = (idx == len(groups) - 1) or (new_len >= len(groups[idx + 1]))

                if prev_ok and next_ok:
                    valid_candidates.append((len(g), idx, g))

            if not valid_candidates:
                break

            min_len = min(x[0] for x in valid_candidates)
            min_candidates = [x for x in valid_candidates if x[0] == min_len]

            _, _, target = random.choice(min_candidates)

            target.append(item)

        else:
            best_result = groups
            break

    if best_result is None:
        random.shuffle(items_sorted)

output_text = parts[0]

for i in range(len(best_result)):
    list_text = ",".join(display_name[x] for x in best_result[i])
    output_text += ": " + list_text + parts[i + 1]

output_text

`;

try {
    let result = await pyodide.runPythonAsync(pythonCode);
    outputElem.textContent = result;
} catch(err) {
    outputElem.textContent = "Error:\\n" + err;
}

}
</script>

</body>
</html>
